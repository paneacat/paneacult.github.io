<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Contatti — paneacult</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    .contact {
      text-align: center;
      margin-top: 60px;
    }

    .contact h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      margin-bottom: 20px;
    }

    .contact p {
      max-width: 500px;
      margin: 0 auto 30px;
      color: #bfbfbf;
      line-height: 1.6;
    }

    .contact-links {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-top: 30px;
    }

    .contact-links a {
      color: #bfbfbf;
      font-size: 22px;
      text-decoration: none;
      transition: 0.3s;
    }

    .contact-links a:hover {
      color: var(--gold);
    }

    .email {
      margin-top: 25px;
      font-size: 16px;
      color: #bfbfbf;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .contact h1 {
        font-size: 32px;
      }

      .contact-links {
        gap: 18px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="hero">
      <a href="index.html" class="logo">paneacult</a>
    </div>

    <nav class="menu">
      <a href="archivio.html">Recensioni</a>
      <a href="featured.html">Chi sono</a>
      <a href="contatti.html" class="active">Contatti</a>
    </nav>
  </header>

  <!-- CONTENUTO -->
  <div class="container contact">

    <h1>Contatti</h1>

    <p>
      Se vuoi scrivermi, collaborare o semplicemente parlare di cinema,
      questo è il posto giusto.
    </p>

    <!-- SOCIAL -->
    <div class="contact-links">
      <a href="https://instagram.com" target="_blank">IG paneacult</a>
      <a href="https://instagram.com" target="_blank">IG personale</a>
    </div>

    <div class="email">
      oppure scrivi a: <br>
      <strong>patrizia.catania22@gmail.com</strong>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    2026 © paneacult
  </footer>

</body>
</html>
