<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Archivio — paneacult</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>

<body class="archivio">

<header>
  <div class="hero">
    <a href="index.html" class="logo">paneacult</a>
  </div>

  <nav class="menu">
    <a href="archivio.html" class="active">Recensioni</a>
    <a href="featured.html">Chi sono</a>
    <a href="contatti.html">Contatti</a>
  </nav>
</header>

<!-- TITOLO -->
<section class="banner-link">
  <h2>Archivio completo</h2>
</section>

<!-- FILTRI -->
<div class="filtri">

  <div class="filtro-gruppo">
    <span>Categoria</span>
    <button class="filtro attivo" data-tipo="categoria" data-valore="tutti">Tutti</button>
    <button class="filtro" data-tipo="categoria" data-valore="resta">Cinema che resta</button>
    <button class="filtro" data-tipo="categoria" data-valore="sguardi">Sguardi contemporanei</button>
  </div>

  <div class="filtro-gruppo">
    <span>Genere</span>
    <button class="filtro attivo" data-tipo="genere" data-valore="tutti">Tutti</button>
    <button class="filtro" data-tipo="genere" data-valore="dramma">Dramma</button>
    <button class="filtro" data-tipo="genere" data-valore="commedia">Commedia</button>
    <button class="filtro" data-tipo="genere" data-valore="thriller">Thriller</button>
    <button class="filtro" data-tipo="genere" data-valore="giallo">Giallo</button>
  </div>

</div>

<!-- GRID -->
<section class="section">
  <div class="container">

    <div class="grid archivio-grid">

      <!-- FILM -->
      <a href="dittatore.html" class="card"
         data-categoria="resta"
         data-genere="commedia dramma">
        <img src="img/dittatore.png">
        <div class="card-info">
          <h3>Il Grande Dittatore</h3>
          <p>Charlie Chaplin (1940)</p>
        </div>
      </a>

      <a href="uncut.html" class="card"
         data-categoria="sguardi"
         data-genere="dramma thriller">
        <img src="img/uncut.png">
        <div class="card-info">
          <h3>Uncut Gems</h3>
          <p>Safdie Brothers (2019)</p>
        </div>
      </a>

      <a href="tramonto.html" class="card"
         data-categoria="resta"
         data-genere="dramma giallo">
        <img src="img/viale-del-tramonto.jpg">
        <div class="card-info">
          <h3>Sunset Boulevard</h3>
          <p>Billy Wilder (1950)</p>
        </div>
      </a>

    </div>

  </div>
</section>

<!-- BACK HOME SOLO MOBILE -->
<div class="back-home">
  <a href="index.html">← Torna alla home</a>
</div>

<footer>
  2026 © paneacult
</footer>

<script src="script.js"></script>

</body>
</html>
