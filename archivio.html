<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>paneacult</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

</head>

<body class="home">
<header class="site-header">
  <a href="index.html" class="logo">paneacult</a>

  <nav class="menu">
    <a href="index.html">Home</a>
    <a href="archivio.html" class="active">Recensioni</a>
    <a href="featured.html">Chi sono</a>
    <a href="contatti.html">Contatti</a>
  </nav>
</header>

<!-- FILTRI -->
<div class="filtri">

  <!-- CATEGORIA -->
  <div class="filtri-buttons">
<button class="filtro filtro-categoria attivo" data-filter="tutti">Tutti</button>
<button class="filtro filtro-categoria" data-filter="cinema-che-resta">Cinema che resta</button>
<button class="filtro filtro-categoria" data-filter="sguardi-contemporanei">Sguardi contemporanei</button>
  </div>

  <!-- GENERE -->
  <div class="filtri-buttons">
<button class="filtro filtro-genere attivo" data-genere="tutti">Tutti</button>
<button class="filtro filtro-genere" data-genere="dramma">Dramma</button>
<button class="filtro filtro-genere" data-genere="commedia">Commedia</button>
<button class="filtro filtro-genere" data-genere="thriller">Thriller</button>
<button class="filtro filtro-genere" data-genere="giallo">Giallo</button>
  </div>

</div>

<!-- GRID -->
<section class="section">
  <div class="archivio-grid">
<div id="emptyState" class="empty-state">
    Nessun film trovato <span>★</span>
</div>
    <!-- IL GRANDE DITTATORE -->
    <a href="dittatore.html"
       class="card"
       data-categoria="cinema-che-resta"
       data-genere="commedia dramma">

      <img src="img/dittatore.png">

      <div class="rating">★★★★★</div>

      <div class="card-info">
        <h3>Il Grande Dittatore (1940)</h3>
        <p>Charlie Chaplin</p>
      </div>

    </a>

    <!-- UNCUT GEMS -->
    <a href="uncut.html"
       class="card"
       data-categoria="sguardi-contemporanei"
       data-genere="dramma thriller">

      <img src="img/uncut.png">

      <div class="rating">★★★★☆</div>

      <div class="card-info">
        <h3>Uncut Gems (2019)</h3>
        <p>Safdie Brothers</p>
      </div>

    </a>

    <!-- SUNSET BOULEVARD -->
    <a href="tramonto.html"
       class="card"
       data-categoria="cinema-che-resta"
       data-genere="dramma giallo">

      <img src="img/viale-del-tramonto.jpg">

      <div class="rating">★★★★★</div>

      <div class="card-info">
        <h3>Sunset Boulevard (1950)</h3>
        <p>Billy Wilder</p>
      </div>

    </a>

  </div>
</section>

<div class="load-more">
  <button id="loadMoreBtn">Carica altro</button>
</div>

<div class="container">
  <section class="newsletter">
    <div class="newsletter-inner">
      <h2>Resta con paneacult</h2>
      <p>Ricevi le nuove recensioni nella tua inbox!</p>
      <a href="#" class="newsletter-btn">Iscriviti</a>
    </div>
  </section>
</div>

<footer>
  2026 © paneacult
</footer>

<script src="script.js"></script>

</body>
</html>
