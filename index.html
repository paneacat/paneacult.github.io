<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>paneacult</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */

:root {
  --bg: #0b1f26;
  --gold: #ffbf00;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: white;
}

a {
  color: white;
  text-decoration: none;
}

/* ===== HEADER ===== */

header {
  text-align: center;
  padding: 30px 20px;
  position: relative;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
  color: var(--gold);
  margin: 0;
  letter-spacing: 1px;
}

/* ===== MENU ===== */

.menu {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin-top: 15px;
}

.menu a {
  color: #aaa;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: 0.3s;
}

.menu a:hover {
  color: var(--gold);
}

/* ===== HAMBURGER ===== */

.hamburger {
  display: none;
  position: absolute;
  right: 20px;
  top: 30px;
  cursor: pointer;
}

.hamburger span {
  display: block;
  width: 25px;
  height: 2px;
  background: white;
  margin: 5px 0;
  transition: 0.3s;
}

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}
.hamburger.active span:nth-child(2) {
  opacity: 0;
}
.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -5px);
}

/* ===== MOBILE MENU ===== */

@media (max-width: 700px) {

  .hamburger {
    display: block;
  }

  .menu {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px 0;
    display: none;
  }

  .menu.active {
    display: flex;
  }

  .hero h1 {
    font-size: 28px;
  }
}

/* ===== OVERLAY ===== */

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.overlay.active {
  opacity: 1;
  pointer-events: all;
}
  .menu {
  position: relative;
  z-index: 20;
  }

/* ===== SOCIAL ===== */

.social {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin: 10px 0;
}

.social a {
  opacity: 0.5;
  font-size: 18px;
}

.social a:hover {
  color: var(--gold);
  opacity: 1;
}

/* ===== BANNER ===== */

.banner-link {
  max-width: 900px;
  margin: 30px auto;
  padding: 0 20px;
  text-align: center;
}

.banner-link h2 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  line-height: 1.5;
}

/* ===== FILTRI ===== */

.filtri {
  text-align: center;
  margin: 20px 0;
}

.filtro {
  background: transparent;
  color: white;
  border: 1px solid transparent;
  padding: 6px 12px;
  margin: 5px;
  cursor: pointer;
}

.filtro.attivo {
  color: var(--gold);
  border-color: var(--gold);
}

/* ===== GRID ===== */

.section {
  max-width: 900px;
  margin: 40px auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
}

/* ===== CARD ===== */

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 12px;
}

.card-info h3 {
  margin: 6px 0;
  font-size: 15px;
}

.card-info p {
  font-size: 12px;
  color: var(--gold);
}

/* ===== NEWSLETTER ===== */

.newsletter {
  text-align: center;
  margin: 60px 20px;
}

.newsletter h2 {
  color: var(--gold);
  font-size: 14px;
}

/* ===== FOOTER ===== */

footer {
  text-align: center;
  padding: 30px;
  font-size: 12px;
  opacity: 0.5;
}

</style>
</head>

<body>

<header>

  <div class="hamburger" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="hero">
    <h1>paneacult</h1>
  </div>

  <nav class="menu" id="menu">
    <a href="featured.html">Chi sono</a>
    <a href="archivio.html">Archivio</a>
    <a href="contatti.html">Contatti</a>
  </nav>

</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- SOCIAL -->
<div class="social">
  <a href="#"><i class="fab fa-instagram"></i></a>
  <a href="#"><i class="fas fa-envelope"></i></a>
</div>

<!-- BANNER -->
<section class="banner-link">
  <h2>Il cinema non è intrattenimento.<br>È ciò che resta.</h2>
</section>

<!-- FILTRI -->
<div class="filtri">
  <button class="filtro attivo" data-filtro="tutti">Tutti</button>
  <button class="filtro" data-filtro="resta">Cinema che resta</button>
  <button class="filtro" data-filtro="sguardi">Sguardi contemporanei</button>
</div>

<!-- GRID -->
<section class="section grid">

  <a href="dittatore.html" class="card" data-tag="resta">
    <img src="img/dittatore.png">
    <div class="card-info">
      <h3>Il Grande Dittatore</h3>
      <p>Charlie Chaplin (1940)</p>
    </div>
  </a>

  <a href="uncut.html" class="card" data-tag="sguardi">
    <img src="img/uncut.png">
    <div class="card-info">
      <h3>Uncut Gems</h3>
      <p>Safdie Brothers (2019)</p>
    </div>
  </a>

  <a href="tramonto.html" class="card" data-tag="resta">
    <img src="img/viale-del-tramonto.jpg">
    <div class="card-info">
      <h3>Sunset Boulevard</h3>
      <p>Billy Wilder (1950)</p>
    </div>
  </a>

</section>

<!-- NEWSLETTER -->
<section class="newsletter">
  <h2>Resta con paneacult</h2>
  <iframe src="https://paneacult.substack.com/embed" width="100%" height="150"></iframe>
</section>

<!-- FOOTER -->
<footer>
  <p>2026 © paneacult</p>
</footer>

<script>

const filtri = document.querySelectorAll('.filtro');
const cards = document.querySelectorAll('.card');

filtri.forEach(filtro => {
  filtro.addEventListener('click', () => {

    filtri.forEach(f => f.classList.remove('attivo'));
    filtro.classList.add('attivo');

    const categoria = filtro.dataset.filtro;

    cards.forEach(card => {
      const tag = card.dataset.tag;
      card.style.display =
        (categoria === "tutti" || tag === categoria)
        ? "block"
        : "none";
    });
  });
});

function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
  document.querySelector(".hamburger").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

</script>

</body>
</html>
