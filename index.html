<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>paneacult</title>

<style>
body {
  background: #0f1f2a;
  color: white;
  font-family: Arial, sans-serif;
  margin: 0;
  body {
  background: #0f1f2a;
  margin: 0;
  }
}
.filtro.attivo {
  color: #ffbf00;
  border-color: #ffbf00;
  box-shadow: 0 0 6px rgba(255,191,0,0.5);
}
/* HEADER */
h1 {
  text-align: center;
  color: #ffbf00;
  margin: 20px 0;
  letter-spacing: 2px;
}

/* FILTRI */
.filtri {
  text-align: center;
  margin-bottom: 20px;
}

.filtro {
  background: transparent;
  color: white;
  border: 1px solid transparent;
  padding: 6px 12px;
  margin: 5px;
  cursor: pointer;
  transition: all 0.25s;
}

.filtro:hover {
  color: #ffbf00;
  text-shadow: 0 0 6px rgba(255,191,0,0.6);
}

.filtro.attivo {
  color: #ffbf00;
  border-color: #ffbf00;
  box-shadow: 0 0 8px rgba(255,191,0,0.7);
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
  max-width: 1100px;
  margin: auto;
}

.card {
  border-radius: 12px;
  overflow: hidden;
  transition: transform 0.3s;
}

.card img {
  width: 100%;
  height: 320px;
  object-fit: cover;
}

/* HOVER */
.card:hover {
  transform: scale(1.08);
  z-index: 2;
}

.overlay {
  position: absolute;
  bottom: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  width: 100%;
  padding: 10px;
  opacity: 0;
  transition: 0.3s;
}

.card:hover .overlay {
  opacity: 1;
}

.overlay h3 {
  margin: 0;
  font-size: 14px;
}

.overlay p {
  font-size: 12px;
  color: #ffbf00;
}

/* HIDE */
.nascosta {
  display: none;
}
</style>
</head>

<body>
<h1>paneacult</h1>

<!-- FILTRI RUBRICHE -->
<div class="filtri">
  <button class="filtro attivo" data-filtro="tutti">Tutti</button>
  <button class="filtro" data-filtro="resta">Cinema che resta</button>
  <button class="filtro" data-filtro="sguardi">Sguardi contemporanei</button>
</div>

<!-- GRID -->
<div class="container">
  <div class="card" data-tag="resta">
    <img src="img/Grandedittatore2.jpg">
    <div class="overlay">
      <h3>Il grande dittatore</h3>
      <p>#cinema che resta</p>
    </div>
  </div>

  <div class="card" data-tag="sguardi">
    <img src="img/uncut.jpg">
    <div class="overlay">
    <h3>Uncut Gems</h3>
      <p>#sguardi contemporanei</p>
    </div>
  </div>

  <div class="card" data-tag="resta">
    <img src="img/viale-del-tramonto.jpg">
    <div class="overlay">
      <h3>Sunset Boulevard</h3>
      <p>#cinema che resta</p>
    </div>
  </div>
</div>

<!-- SCRIPT -->
<script>
const filtri = document.querySelectorAll('.filtro');
const cards = document.querySelectorAll('.card');

filtri.forEach(filtro => {
  filtro.addEventListener('click', () => {

    filtri.forEach(f => f.classList.remove('attivo'));
    filtro.classList.add('attivo');

    const categoria = filtro.dataset.filtro;

    cards.forEach(card => {
      const tags = card.dataset.tag;

      if (categoria === "tutti" || tags.includes(categoria)) {
        card.classList.remove('nascosta');
      } else {
        card.classList.add('nascosta');
      }
    });

  });
});
</script>

</body>
</html>
