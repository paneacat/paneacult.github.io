<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paneacult</title>

<style>
:root {
  --bg: #0f1f2a;
  --gold: #ffbf00;
  --text: #ffffff;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  text-align: center;
  padding: 30px 20px 10px;
}

h1 {
  color: var(--gold);
  letter-spacing: 2px;
  margin-bottom: 10px;
}

/* SOCIAL */
.social {
  margin-top: 10px;
  font-size: 14px;
}

.social a {
  margin: 0 10px;
  text-decoration: none;
  color: white;
  opacity: 0.7;
  transition: 0.3s;
}

.social a:hover {
  color: var(--gold);
  opacity: 1;
}

/* FILTRI */
.filtri {
  margin-top: 20px;
}

.filtro {
  background: transparent;
  color: white;
  border: 1px solid transparent;
  padding: 6px 12px;
  margin: 5px;
  cursor: pointer;
  transition: all 0.25s;
}

.filtro:hover {
  color: var(--gold);
}

.filtro.attivo {
  color: var(--gold);
  border-color: var(--gold);
  box-shadow: 0 0 6px rgba(255,191,0,0.5);
}

/* SEZIONE CARD */
.section {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  position: relative;
  display: block;
  overflow: hidden;
  border-radius: 12px;
  text-decoration: none;
}

.card img {
  width: 100%;
  height: 320px;
  object-fit: cover;
  transition: 0.3s;
}

.card:hover img {
  transform: scale(1.05);
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  opacity: 0;
  transition: 0.3s;
}

.card:hover .overlay {
  opacity: 1;
}

.overlay h3 {
  margin: 0;
  font-size: 14px;
}

.overlay p {
  font-size: 12px;
  color: var(--gold);
}

/* NASCONDI */
.nascosta {
  display: none;
}

/* NEWSLETTER */
  .newsletter {
  max-width: 500px;
  margin: 60px auto;
  text-align: center;
  }

.newsletter h2 {
  color: var(--gold);
  margin-bottom: 10px;
}

.newsletter p {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 20px;
}
  .section {
  margin-top: 50px;
  }

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<header>
  <h1>paneacult</h1>

  <div class="social">
    <a href="#">Instagram</a>
    <a href="#">Newsletter</a>
  </div>

  <div class="filtri">
    <button class="filtro attivo" data-filtro="tutti">Tutti</button>
    <button class="filtro" data-filtro="resta">Cinema che resta</button>
    <button class="filtro" data-filtro="sguardi">Sguardi contemporanei</button>
  </div>
</header>

<!-- CARD SECTION -->
<section class="section">
  <div class="grid">

    <a href="dittatore.html" class="card" data-tag="resta">
      <img src="img/dittatore.jpg">
      <div class="overlay">
        <h3>Il grande dittatore</h3>
        <p>#cinemacheresta</p>
      </div>
    </a>

    <a href="uncut.html" class="card" data-tag="sguardi">
      <img src="img/uncut.jpg">
      <div class="overlay">
        <h3>Uncut Gems</h3>
        <p>#sguardicontemporanei</p>
      </div>
    </a>

    <a href="tramonto.html" class="card" data-tag="resta">
      <img src="img/viale-del-tramonto.jpg">
      <div class="overlay">
        <h3>Sunset Boulevard</h3>
        <p>#cinemacheresta</p>
      </div>
    </a>

  </div>
</section>

<!-- NEWSLETTER -->
<section class="newsletter">
  <h2 style="color:#ffbf00;">Resta con paneacult</h2>
  <p>Ricevi le nuive recensioni direttamente sulla tua mail preferita!</p>

  <iframe src="https://paneacult.substack.com/embed"
          width="100%"
          height="150"
          style="border:1px solid #eee; background:white;">
  </iframe>
</section>

<footer>
2026 © paneacult
</footer>

<script>
const filtri = document.querySelectorAll('.filtro');
const cards = document.querySelectorAll('.card');

filtri.forEach(filtro => {
  filtro.addEventListener('click', () => {

    filtri.forEach(f => f.classList.remove('attivo'));
    filtro.classList.add('attivo');

    const categoria = filtro.dataset.filtro;

    cards.forEach(card => {
      const tags = card.dataset.tag;

      if (categoria === "tutti" || tags.includes(categoria)) {
        card.classList.remove('nascosta');
      } else {
        card.classList.add('nascosta');
      }
    });

  });
});
</script>

</body>
</html>
