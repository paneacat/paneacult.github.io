<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>paneacult</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    :root {
      --gold: #ffbf00;
      --bg: #1b465b;
      --card: #0f2f3d;
      --text: #e6edf3;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* HEADER */

    header {
      text-align: center;
      padding: 60px 20px 20px;
    }

    .topline {
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.5;
      margin-bottom: 10px;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      color: var(--gold);
      margin: 0;
    }

    .subtitle {
      font-size: 16px;
      opacity: 0.7;
      margin-top: 10px;
    }

    /* FILTRI */

    .filtri {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-width: 400px;
      margin: 20px auto;
    }

    .filtri button {
      padding: 6px;
      border-radius: 20px;
      border: none;
      background: #2a4f60;
      color: white;
      font-size: 12px;
      cursor: pointer;
    }

    /* GRID */

    .grid {
      max-width: 900px;
      margin: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .categoria {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--gold);
    }

    .card h3 {
      margin: 10px 0 5px;
    }

    .card a {
      color: inherit;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.5;
    }

    /* MOBILE */

    @media(max-width:700px) {
      .grid {
        grid-template-columns: 1fr;
      }
.filtro {
  background: transparent;
  color: white;
  border: 1px solid transparent;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.25s ease;
}

/* effetto hover */
.filtro:hover {
  color: #ffbf00;
  text-shadow: 0 0 6px rgba(255,191,0,0.6);
}

/* stato attivo */
.filtro.attivo {
  color: #ffbf00;
  border-color: #ffbf00;
  box-shadow: 0 0 8px rgba(255,191,0,0.7);
}
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="topline">notes on cinema by Patrizia Catania</div>
    <h1 class="brand">paneacult</h1>
    <div class="subtitle">my therapist says cinema</div>
  </header>

  <!-- FILTRI -->
  <div class="filtri">
    <button onclick="filtra('tutti')">Tutti</button>
    <button onclick="filtra('resta')">Cinema che resta</button>
    <button onclick="filtra('contemporanei')">Contemporanei</button>
  </div>
  <div class="filtri">
  <button class="filtro attivo">Tutti</button>
  <button class="filtro">Drama</button>
  <button class="filtro">Horror</button>
  <button class="filtro">Comedy</button>
  </div>

  <!-- ARTICOLI -->
  <div class="grid">

    <div class="card" data-tags="resta">
      <a href="dittatore.html">
        <img src="img/Grandedittatore2.jpg">
        <div class="card-content">
          <div class="categoria">Cinema che resta</div>
          <h3>Il grande Dittatore</h3>
          <p>Charlie Chaplin (1940)</p>
        </div>
      </a>
    </div>

    <div class="card" data-tags="contemporanei">
      <a href="uncut.html">
        <img src="img/uncut.jpg">
        <div class="card-content">
          <div class="categoria">Sguardi contemporanei</div>
          <h3>Uncut Gems</h3>
          <p>Safdie Brothers (2019)</p>
        </div>
      </a>
    </div>

    <div class="card" data-tags="resta">
      <a href="tramonto.html">
        <img src="img/viale-del-tramonto.jpg">
        <div class="card-content">
          <div class="categoria">Cinema che resta</div>
          <h3>Sunset Boulevard</h3>
          <p>Billy Wilder (1950)</p>
        </div>
      </a>
    </div>

  </div>

  <footer>
    © 2026 paneacult
  </footer>

  <script>
const filtri = document.querySelectorAll('.filtro');

filtri.forEach(filtro => {
  filtro.addEventListener('click', () => {
    filtri.forEach(f => f.classList.remove('attivo'));
    filtro.classList.add('attivo');
  });
});
  </script>
</body>
</html>
