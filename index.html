<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>paneacult</title>

  <style>
    /* ====== VARIABILI ====== */
:root {
  --gold: #ffbf00;
  --blue: #1b465b;
  --dark: #0f1720;
  --card: #16202a;
  --text: #e6edf3;
}

/* ====== BASE ====== */
body {
  margin: 0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--dark);
  color: var(--text);
}

/* ====== HEADER ====== */
header {
  background: linear-gradient(90deg, var(--blue), #0d2c3a);
  padding: 30px;
  text-align: center;
  border-bottom: 2px solid var(--gold);
}

header h1 {
  margin: 0;
  color: var(--gold);
  letter-spacing: 1px;
}

header p {
  margin-top: 8px;
  opacity: 0.8;
}

/* ====== LAYOUT ====== */
main {
  padding: 25px;
  max-width: 900px;
  margin: auto;
}

/* ====== CARD LINK ====== */
.link-card {
  text-decoration: none;
  color: inherit;
  display: block;
}

/* ====== CARD ====== */
.recensione {
  background: var(--card);
  margin-bottom: 30px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.05);
  transition: all 0.25s ease;
  position: relative;
}

.recensione:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  border-color: rgba(255,191,0,0.3);
}

/* ====== IMMAGINE ====== */
.cover {
  width: 100%;
  height: 240px;
  object-fit: cover;
  display: block;
  filter: brightness(0.75);
  transition: 0.3s;
}

.recensione:hover .cover {
  filter: brightness(0.9);
  transform: scale(1.02);
}

/* ====== CONTENUTO ====== */
.contenuto {
  padding: 20px;
}

.titolo {
  font-size: 22px;
  margin-bottom: 5px;
  color: white;
}

.meta {
  font-size: 13px;
  opacity: 0.5;
  margin-bottom: 12px;
}

/* ====== STELLE ====== */
.stelle {
  color: var(--gold);
  font-size: 16px;
  letter-spacing: 4px;
  margin-bottom: 12px;
}

/* ====== TESTO ====== */
.mini {
  opacity: 0.75;
  line-height: 1.5;
  font-size: 14px;
}

/* ====== CTA ====== */
.leggi {
  display: inline-block;
  margin-top: 12px;
  font-size: 13px;
  color: var(--gold);
  transition: 0.2s;
}

.recensione:hover .leggi {
  letter-spacing: 1px;
}

/* ====== PAGINA ARTICOLO ====== */
.article {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.article img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 20px;
}

.article h1 {
  color: var(--gold);
}

.article p {
  line-height: 1.7;
  margin-bottom: 16px;
}

/* ====== BACK LINK ====== */
.back {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--gold);
  text-decoration: none;
  opacity: 0.8;
}

.back:hover {
  opacity: 1;
}

/* ====== FOOTER ====== */
footer {
  text-align: center;
  padding: 15px;
  border-top: 1px solid #222;
  margin-top: 40px;
  font-size: 14px;
  opacity: 0.6;
}
    /* forza il testo bianco ovunque */
body, p, h1, h2, h3, span {
  color: var(--text);
}

/* link bianchi (non blu browser) */
a {
  color: var(--text);
}
  </style>
</head>

<body>

<header>
  <h1>paneacult</h1>
  <p>My therapist says cinema</p>
</header>

<main>
<a href="dittatore.html" class="link-card">
  <div class="recensione">

    <img class="cover" src="img/Grandedittatore2.jpg">

    <div class="contenuto">
      <h1 class="titolo">Cinema che resta</h1>
        <h2>#1 Il grande Dittatore</h2>
      <p class="meta">Charlie Chaplin (1940)</p>

      <div class="stelle">★★★★★</div>

      <p class="mini">
        Una satira potentissima che ridicolizza il nazismo e culmina in uno dei discorsi più iconici del cinema.
      </p>

      <span class="leggi">Leggi recensione→</span>
    </div>

  </div>
</a>
</main>

<footer>
  <p>&copy; 2026 paneacult</p>
</footer>

</body>
</html>
