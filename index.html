<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>paneacult</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #0b1f26;
  --gold: #ffbf00;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
}
body {
  background: #0b1f26;
  color: white;
}
/* HERO */

.hero {
  padding: 40px 20px 20px;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  color: var(--gold);
  margin-bottom: 10px;
}

.tagline {
  font-size: 14px;
  opacity: 0.7;
  line-height: 1.6;
}

/* NAV */

.nav {
  text-align: center;
  margin-bottom: 10px;
}

.nav a {
  margin: 0 10px;
  font-size: 13px;
  color: white;
  text-decoration: none;
  opacity: 0.6;
}

.nav a:hover {
  opacity: 1;
}

/* FILTRI */

.filtri {
  text-align: center;
  margin: 20px 0;
}

.filtro {
  background: transparent;
  color: white;
  border: 1px solid transparent;
  padding: 6px 12px;
  margin: 5px;
  cursor: pointer;
  transition: 0.3s;
}

.filtro:hover {
  color: var(--gold);
}

.filtro.attivo {
  color: var(--gold);
  border-color: var(--gold);
  box-shadow: 0 0 8px rgba(255,191,0,0.6);
}

/* SEZIONE */

.section {
  max-width: 1100px;
  margin: 20px auto;
  padding: 0 20px;
}

/* GRID */

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

/* CARD */

.card {
  text-decoration: none;
  color: white;
}

.card img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover img {
  transform: scale(1.03);
}

.card-info {
  padding: 8px 2px;
}

.card-info h3 {
  margin: 6px 0;
  font-size: 15px;
}

.card-info p {
  font-size: 12px;
  color: var(--gold);
}

/* NEWSLETTER */

.newsletter {
  text-align: center;
  margin: 60px 20px;
}

.newsletter h2 {
  color: var(--gold);
  font-family: 'Playfair Display', serif;
}

.newsletter p {
  opacity: 0.7;
  font-size: 14px;
}

.newsletter iframe {
  margin-top: 15px;
  border-radius: 8px;
}
.featured img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
}

.featured {
  max-width: 900px;
  margin: 20px auto;
  padding: 0 20px;
}
  a {
  color: white;
  text-decoration: none;
}

a:visited {
  color: white;
}
  .section {
  margin: 40px auto;
  }
/* FOOTER */

footer {
  text-align: center;
  padding: 30px;
  font-size: 12px;
  opacity: 0.5;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>paneacult</h1>
  <p class="tagline">
    Il cinema non è intrattenimento.<br>
    È ciò che resta.
  </p>
</section>

<!-- NAV -->
<div class="nav">
  <a href="https://www.instagram.com/paneacult_?igsh=anRrb3FoaDBwOTNx">Instagram</a>
<a href="https://substack.com/@paneacult?utm_source=share&utm_medium=android&r=7pkj8b">Newsletter</a>
</div>

<!-- FILTRI -->
<div class="filtri">
  <button class="filtro attivo" data-filtro="tutti">Tutti</button>
  <button class="filtro" data-filtro="resta">Cinema che resta</button>
  <button class="filtro" data-filtro="sguardi">Sguardi contemporanei</button>
</div>
<section class="featured">
  <a href="dittatore.html">
    <img src="img/dittatore.jpg">
    <h2>Il grande dittatore</h2>
    <p>#cinemacheresta</p>
  </a>
</section>
<!-- GRID -->
<section class="section">
  <div class="grid">
    <a href="uncut.html" class="card" data-tag="sguardi">
      <img src="img/uncut.jpg">
      <div class="card-info">
        <h3>Uncut Gems</h3>
        <p>#sguardicontemporanei</p>
      </div>
    </a>
    <a href="tramonto.html" class="card" data-tag="resta">
      <img src="img/viale-del-tramonto.jpg">
      <div class="card-info">
        <h3>Sunset Boulevard</h3>
        <p>#cinemacheresta</p>
      </div>
    </a>
  </div>
</section>
<!-- NEWSLETTER -->
<section class="newsletter">
  <h2>Resta con paneacult</h2>
  <p>Ricevi le nuove recensioni direttamente nella tua mail preferita</p>

  <iframe src="https://paneacult.substack.com/embed"
          width="100%" height="150"
          style="border:1px solid #eee; background:white;">
  </iframe>
</section>

<!-- FOOTER -->
<footer>
  2026 © paneacult
</footer>

<!-- SCRIPT FILTRI -->
<script>
const filtri = document.querySelectorAll('.filtro');
const cards = document.querySelectorAll('.card');

filtri.forEach(filtro => {
  filtro.addEventListener('click', () => {

    filtri.forEach(f => f.classList.remove('attivo'));
    filtro.classList.add('attivo');

    const categoria = filtro.dataset.filtro;

    cards.forEach(card => {
      const tag = card.dataset.tag;

      if (categoria === "tutti" || tag === categoria) {
        card.style.display = "block";
      } else {
        card.style.display = "none";
      }
    });
  });
});
</script>

</body>
</html>
